<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Convofy - Professional Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#c0c1ff",
                    "primary-fixed": "#dae2fd",
                    "surface": "#f7f9fb",
                    "secondary-fixed-dim": "#7bd0ff",
                    "primary": "#000000",
                    "primary-fixed-dim": "#bec6e0",
                    "on-tertiary-container": "#7073ff",
                    "surface-bright": "#f7f9fb",
                    "secondary-container": "#40c2fd",
                    "surface-container-highest": "#e0e3e5",
                    "tertiary-container": "#07006c",
                    "surface-variant": "#e0e3e5",
                    "surface-container-high": "#e6e8ea",
                    "inverse-on-surface": "#eff1f3",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#004d6a",
                    "secondary": "#00668a",
                    "on-surface-variant": "#45464d",
                    "surface-container": "#eceef0",
                    "on-surface": "#191c1e",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#e1e0ff",
                    "on-tertiary-fixed-variant": "#2f2ebe",
                    "on-primary-container": "#7c839b",
                    "error-container": "#ffdad6",
                    "background": "#f7f9fb",
                    "surface-dim": "#d8dadc",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#131b2e",
                    "primary-container": "#131b2e",
                    "on-secondary-fixed-variant": "#004c69",
                    "on-primary-fixed-variant": "#3f465c",
                    "inverse-primary": "#bec6e0",
                    "surface-tint": "#565e74",
                    "on-tertiary-fixed": "#07006c",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#c4e7ff",
                    "on-background": "#191c1e",
                    "error": "#ba1a1a",
                    "outline-variant": "#c6c6cd",
                    "tertiary": "#000000",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#76777d",
                    "on-secondary-fixed": "#001e2c",
                    "surface-container-low": "#f2f4f6",
                    "inverse-surface": "#2d3133"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "xl": "32px",
                    "sm": "12px",
                    "layout-margin": "24px",
                    "md": "16px",
                    "xs": "8px",
                    "layout-gutter": "16px",
                    "xxl": "48px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "h3": ["Inter"],
                    "caption": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "h2": ["Inter"],
                    "label-sm": ["Inter"],
                    "h1": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h3": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8FAFC;
        }
    </style>
</head>
<body class="antialiased text-on-surface font-body-md selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="min-h-screen flex items-center justify-center p-layout-margin bg-gradient-to-br from-surface to-surface-container-low">
<div class="w-full max-w-[480px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0px_4px_6px_-1px_rgba(0,0,0,0.05)] p-xl md:p-xxl">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-xl">
<div class="flex items-center gap-xs mb-md">
<div class="w-10 h-10 bg-secondary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl" data-icon="forum">forum</span>
</div>
<span class="text-h2 font-h2 text-primary tracking-tight">Convofy</span>
</div>
<h1 class="text-h3 font-h3 text-on-surface mb-xs">Welcome back</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-xs">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-low border-none rounded-md text-body-md font-body-md focus:ring-2 focus:ring-secondary-container transition-all outline-none" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:text-on-secondary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-low border-none rounded-md text-body-md font-body-md focus:ring-2 focus:ring-secondary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-secondary text-on-secondary font-label-md text-label-md py-md rounded-md shadow-sm hover:bg-on-secondary-container active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-caption font-caption">
<span class="px-md bg-surface-container-lowest text-outline uppercase tracking-widest">Or continue with</span>
</div>
</div>
<!-- SSO Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-xs py-md px-lg bg-surface-container-lowest border border-outline-variant rounded-md hover:bg-surface-container transition-all text-body-md font-label-md">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google logo emblem with colorful red, yellow, green, and blue segments on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXgtcFpLtPyDXM7Gy-5wflw8plcZhiU0PKdBZf5J0EvmDHw_xWQr751FVzqBatOvvKQF8LYr-k1G7fmrEJhLxdm1CgJSCId5aCRMS9eeIKTDrggMlMNVhG-GA6GLL0rrB1shs8WHVvA-fRCFwYPDrJzSelxFHeNZL1JikVanffQF4-5LrrpdufM7sAajLyP0DLisHPzIAor8xfuj7hXUp02JI-vYIwyPU6vd0Jx3EuX-WdiXd9QDFMSmpTJbJ9rf8liQPHmEP27cOQ"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-xs py-md px-lg bg-surface-container-lowest border border-outline-variant rounded-md hover:bg-surface-container transition-all text-body-md font-label-md">
<span class="material-symbols-outlined text-[20px] text-primary" data-icon="vpn_key">vpn_key</span>
                        SSO
                    </button>
</div>
<!-- Sign Up Footer -->
<div class="mt-xl text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-secondary font-label-md hover:underline decoration-2 underline-offset-4" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Global Footer Info -->
<div class="mt-xl text-center flex flex-col gap-xs">
<p class="text-caption font-caption text-outline">
                    © 2024 Convofy Technologies Inc. All rights reserved.
                </p>
<div class="flex justify-center gap-lg">
<a class="text-caption font-caption text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-caption font-caption text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
</main>
<!-- Decorative Canvas Elements (Subtle) -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-1/2 bg-secondary-fixed-dim/10 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/3 h-1/3 bg-tertiary-fixed-dim/10 blur-[100px] rounded-full"></div>
</body></html>
