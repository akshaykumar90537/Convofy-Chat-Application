<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convofy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <div id="app-container">
        <!-- Background Animated Orbs (only visible during login) -->
        <div class="orb orb-1" id="orb-1"></div>
        <div class="orb orb-2" id="orb-2"></div>
        <div class="orb orb-3" id="orb-3"></div>

        <!-- Join Screen overlay -->
        <div id="join-screen" class="login-card active">
            <div class="login-header">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Login to continue to Convofy.</p>
            </div>
            <form id="join-form">
                <div class="input-group">
                    <label for="username-input">Username</label>
                    <input type="text" id="username-input" placeholder="Enter username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label for="password-input">Password</label>
                    <input type="password" id="password-input" placeholder="Enter password" autocomplete="off" required>
                </div>
                
                <div id="register-fields" style="display: none;">
                    <div class="input-group">
                        <label for="security-question">Security Question</label>
                        <select id="security-question" required>
                            <option value="What is your pet name?">What is your pet name?</option>
                            <option value="What is your favorite color?">What is your favorite color?</option>
                            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="security-answer">Answer</label>
                        <input type="text" id="security-answer" placeholder="Enter answer" autocomplete="off" required>
                    </div>
                </div>

                <div class="forgot-pwd-wrapper">
                    <button type="button" id="forgot-btn" class="text-btn">Forgot Password?</button>
                </div>
                <div id="auth-error" class="error-msg hidden"></div>
                <button type="submit" id="auth-submit-btn" class="submit-btn">Login</button>
            </form>
            <div class="auth-toggle toggle-text">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <button id="auth-toggle-btn" class="toggle-btn" type="button">Register</button>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgot-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h3>Reset Password</h3>
                    <button id="close-forgot-btn" class="icon-btn">&times;</button>
                </div>
                
                <div id="forgot-step-1">
                    <p class="modal-desc">Enter your username to find your account.</p>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="forgot-username" placeholder="Username" autocomplete="off">
                    </div>
                    <div id="forgot-error-1" class="error-msg hidden"></div>
                    <button id="forgot-next-btn" class="submit-btn">Next</button>
                </div>

                <div id="forgot-step-2" class="hidden">
                    <p class="modal-desc" id="display-security-question">Question goes here...</p>
                    <div class="input-group">
                        <label>Answer</label>
                        <input type="text" id="forgot-answer" placeholder="Your Answer" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="forgot-new-password" placeholder="New Password" autocomplete="off">
                    </div>
                    <div id="forgot-error-2" class="error-msg hidden"></div>
                    <button id="forgot-reset-btn" class="submit-btn">Reset Password</button>
                </div>
            </div>
        </div>
        <!-- Main Layout with Sidebar -->
        <div id="main-layout" class="hidden">
            <!-- Sidebar for Online Users -->
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h3>Online Users</h3>
                    <div class="online-indicator">
                        <span class="dot"></span><span id="online-count-number">0</span> live
                    </div>
                </div>
                <ul id="active-users-list" class="users-list">
                    <!-- Users dynamically injected here -->
                </ul>
            </aside>

            <!-- Main Chat Interface -->
            <div id="chat-interface" class="glass-panel">
                <header class="chat-header">
                    <div>
                        <h2>Convofy Room</h2>
                    </div>
                    <div class="user-info">
                       <span id="display-username"></span>
                       <button id="theme-toggle" class="theme-btn" title="Toggle Theme">🌙</button>
                    </div>
                </header>

                <div class="chat-messages-container">
                    <main class="chat-messages" id="chat-messages">
                        <!-- Messages dynamically injected here -->
                    </main>

                    <!-- Typing Indicator -->
                    <div id="typing-indicator" class="hidden">
                        <span id="typing-username">Someone</span> is typing
                        <span class="typing-dots">
                            <span>.</span><span>.</span><span>.</span>
                        </span>
                    </div>
                </div>

                <footer class="chat-footer">
                    <div id="input-context-banner" class="hidden">
                        <span id="input-context-text"></span>
                        <button id="cancel-context-btn" class="icon-btn" title="Cancel">✕</button>
                    </div>
                    <form id="chat-form">
                        <button type="button" id="attachment-btn" class="icon-btn" title="Attach Photo or Video">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.536 4.536 0 01-6.415-6.414l9.624-9.623a2.268 2.268 0 013.208 3.208l-8.66 8.66a1.134 1.134 0 01-1.604-1.604l7.693-7.694" />
                            </svg>
                        </button>
                        <button type="button" id="mic-btn" class="icon-btn" title="Hold to Record Audio">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                            </svg>
                        </button>
                        <input type="file" id="media-input" accept="image/*,video/*" class="hidden">
                        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="send-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                            </svg>
                        </button>
                    </form>
                </footer>
            </div>
        </div>
    </div>

    <!-- Socket.io Script injected by the server -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js?v=3"></script>
</body>
</html>
